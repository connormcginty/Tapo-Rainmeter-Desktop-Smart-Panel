[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=TapoPanel
Author=YourName
Information=Tapo P100 Rainmeter control panel

[Variables]
PythonW=C:\Users\YourUser\AppData\Local\Microsoft\WindowsApps\pythonw.exe
ScriptPath=C:\TapoControl

[MeasureFanStatus]
Measure=WebParser
URL=file://#ScriptPath#\officefan_status.txt
RegExp=(ON|OFF)
StringIndex=1
UpdateRate=1
IfMatch=ON
IfMatchAction=[!SetOption FanStatus FontColor "0,255,0,255"]
IfNotMatchAction=[!SetOption FanStatus FontColor "255,0,0,255"]

[MeasureLedsStatus]
Measure=WebParser
URL=file://#ScriptPath#\officeleds_status.txt
RegExp=(ON|OFF)
StringIndex=1
UpdateRate=1
IfMatch=ON
IfMatchAction=[!SetOption LedsStatus FontColor "0,255,0,255"]
IfNotMatchAction=[!SetOption LedsStatus FontColor "255,0,0,255"]

[MeasureLampStatus]
Measure=WebParser
URL=file://#ScriptPath#\officelamp_status.txt
RegExp=(ON|OFF)
StringIndex=1
UpdateRate=1
IfMatch=ON
IfMatchAction=[!SetOption LampStatus FontColor "0,255,0,255"]
IfNotMatchAction=[!SetOption LampStatus FontColor "255,0,0,255"]

[Background]
Meter=Shape
Shape=Rectangle 0,0,250,200,14 | Fill Color 18,18,18,240 | StrokeWidth 1 | Stroke Color 70,70,70,255

[Title]
Meter=String
Text=Tapo Controls
X=18
Y=12
FontFace=Segoe UI Semibold
FontSize=13
FontColor=255,255,255
AntiAlias=1

[FanButton]
Meter=Shape
Shape=Rectangle 20,48,210,38,10 | Fill Color 45,45,45,255 | StrokeWidth 1 | Stroke Color 85,85,85,255
LeftMouseUpAction=["#PythonW#" "#ScriptPath#\tapo_toggle.py" "officefan"][!Delay 1000][!UpdateMeasure MeasureFanStatus][!UpdateMeter FanStatus][!Redraw]

[FanStatus]
Meter=String
MeasureName=MeasureFanStatus
X=38
Y=58
FontFace=Segoe UI Semibold
FontSize=11
FontColor=255,0,0,255
DynamicVariables=1
AntiAlias=1
LeftMouseUpAction=["#PythonW#" "#ScriptPath#\tapo_toggle.py" "officefan"][!Delay 1000][!UpdateMeasure MeasureFanStatus][!UpdateMeter FanStatus][!Redraw]

[FanText]
Meter=String
Text=Office Fan
X=135
Y=58
FontFace=Segoe UI
FontSize=12
FontColor=255,255,255
StringAlign=Center
AntiAlias=1
LeftMouseUpAction=["#PythonW#" "#ScriptPath#\tapo_toggle.py" "officefan"][!Delay 1000][!UpdateMeasure MeasureFanStatus][!UpdateMeter FanStatus][!Redraw]

[LedsButton]
Meter=Shape
Shape=Rectangle 20,96,210,38,10 | Fill Color 45,45,45,255 | StrokeWidth 1 | Stroke Color 85,85,85,255
LeftMouseUpAction=["#PythonW#" "#ScriptPath#\tapo_toggle.py" "officeleds"][!Delay 1000][!UpdateMeasure MeasureLedsStatus][!UpdateMeter LedsStatus][!Redraw]

[LedsStatus]
Meter=String
MeasureName=MeasureLedsStatus
X=38
Y=106
FontFace=Segoe UI Semibold
FontSize=11
FontColor=255,0,0,255
DynamicVariables=1
AntiAlias=1
LeftMouseUpAction=["#PythonW#" "#ScriptPath#\tapo_toggle.py" "officeleds"][!Delay 1000][!UpdateMeasure MeasureLedsStatus][!UpdateMeter LedsStatus][!Redraw]

[LedsText]
Meter=String
Text=Office LEDs
X=135
Y=106
FontFace=Segoe UI
FontSize=12
FontColor=255,255,255
StringAlign=Center
AntiAlias=1
LeftMouseUpAction=["#PythonW#" "#ScriptPath#\tapo_toggle.py" "officeleds"][!Delay 1000][!UpdateMeasure MeasureLedsStatus][!UpdateMeter LedsStatus][!Redraw]

[LampButton]
Meter=Shape
Shape=Rectangle 20,144,210,38,10 | Fill Color 45,45,45,255 | StrokeWidth 1 | Stroke Color 85,85,85,255
LeftMouseUpAction=["#PythonW#" "#ScriptPath#\tapo_toggle.py" "officelamp"][!Delay 1000][!UpdateMeasure MeasureLampStatus][!UpdateMeter LampStatus][!Redraw]

[LampStatus]
Meter=String
MeasureName=MeasureLampStatus
X=38
Y=154
FontFace=Segoe UI Semibold
FontSize=11
FontColor=255,0,0,255
DynamicVariables=1
AntiAlias=1
LeftMouseUpAction=["#PythonW#" "#ScriptPath#\tapo_toggle.py" "officelamp"][!Delay 1000][!UpdateMeasure MeasureLampStatus][!UpdateMeter LampStatus][!Redraw]

[LampText]
